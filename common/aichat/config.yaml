# see https://github.com/sigoden/aichat/blob/main/config.example.yaml
stream: true
wrap: 80
save: true
use_tools: 'fs'
model: novita:zai-org/glm-5:dumb
compress_threshold: 60000
rag_embedding_model: google:gemini-embedding-001
rag_reranker_model: jina:jina-reranker-v3
rag_chunk_size: 1500
rag_chunk_overlap: 150
clients:
  - type: openai-compatible
    name: jina
    api_base: https://api.jina.ai/v1
    models:
      - name: jina-reranker-v3
        type: reranker
  - type: openai-compatible
    name: novita
    api_base: https://api.novita.ai/openai
    models:
      - name: deepseek/deepseek-v3.2
        supports_vision: false
        max_input_tokens: 163840
        max_output_tokens: 65536
        input_price: 0.269
        output_price: 0.1345
      - name: deepseek/deepseek-v3.2:thinking
        realname: deepseek/deepseek-v3.2
        supports_vision: false
        max_input_tokens: 163840
        max_output_tokens: 65536
        input_price: 0.269
        output_price: 0.1345
        patch:
          body:
            thinking:
              type: enabled
              budget_tokens: 16000
      - name: zai-org/glm-5
        supports_vision: false
        max_input_tokens: 202800
        max_output_tokens: 131072
        input_price: 1
        output_price: 3.2
      - name: zai-org/glm-5:dumb
        real_name: zai-org/glm-5
        supports_vision: false
        max_input_tokens: 202800
        max_output_tokens: 131072
        input_price: 1
        output_price: 3.2
        patch:
          body:
            thinking:
              type: disabled
              budget_tokens: 16000
      - name: qwen/qwen3.5-397b-a17b
        supports_vision: true
        max_input_tokens: 262144
        max_output_tokens: 65536
        input_price: 0.6
        output_price: 3.6
      - name: qwen/qwen3.5-397b-a17b:thinking
        real_name: qwen/qwen3.5-397b-a17b
        supports_vision: true
        max_input_tokens: 262144
        max_output_tokens: 65536
        input_price: 0.6
        output_price: 3.6
        patch:
          body:
            thinking:
              type: enabled
              budget_tokens: 16000
  - type: openai-compatible
    name: google
    api_base: https://generativelanguage.googleapis.com/v1beta/openai/
    models:
      - name: gemini-embedding-001
        type: embedding
      - name: gemini-3-flash-preview
        supports_vision: true
        max_input_tokens: 1048576
        max_output_tokens: 65536
        input_price: 0.5
        output_price: 3
      - name: gemini-3.1-pro-preview
        supports_vision: true
        max_input_tokens: 1048576
        max_output_tokens: 65536
        input_price: 2
        output_price: 12
document_loaders:
  git: >
    sh -c "yek $1 --json | jq '[.[] | { path: .filename, contents: .content }]'"

